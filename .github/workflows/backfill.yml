name: backfill
on:
  workflow_dispatch:
concurrency:
  group: data-pipeline
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test
      - run: npm run backfill
      - name: Commit artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: backfill $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
