name: earnings
on:
  schedule:
    # Board-meeting intimations trickle in daily (~2-4 weeks ahead of results).
    # Poll on weekday mornings; the job is a no-op write when nothing changed.
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
concurrency:
  group: data-pipeline
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  earnings:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test
      - run: npm run earnings
      - name: Commit artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: earnings calendar $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
